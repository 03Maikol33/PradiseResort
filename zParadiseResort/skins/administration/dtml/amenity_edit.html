<div class="container-fluid px-3 px-lg-4 py-4">
  <div class="page-heading">
    <div class="page-heading-copy">
      <span class="page-icon"><i class="bi bi-gift" aria-hidden="true"></i></span>
      <div>
        <p class="eyebrow mb-1"><a href="amenities.php" class="text-decoration-none">Servizi Aggiuntivi</a> / Gestione</p>
        <h1 class="h3 mb-1"><[page_title]></h1>
      </div>
    </div>
  </div>

  <[if!empty show_error]>
  <div class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i> <[error_msg]>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <[/if!empty]>

  <section class="panel mt-3">
    <div class="panel-header">
      <div>
        <h2 class="h5 mb-1 section-title"><i class="bi bi-pencil-square" aria-hidden="true"></i><span>Dettagli Servizio</span></h2>
      </div>
    </div>
    <div class="panel-body p-4">
      <form action="amenity_edit.php" method="POST">
        <input type="hidden" name="id" value="<[am_id]>">

        <div class="row mb-3">
          <div class="col-md-8">
            <label for="name" class="form-label">Nome Servizio <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name" value="<[am_name]>" placeholder="Es. Accesso SPA, Servizio Navetta" required>
          </div>
          <div class="col-md-4">
            <label for="price" class="form-label">Prezzo (€) <span class="text-danger">*</span></label>
            <input type="number" step="0.01" class="form-control" id="price" name="price" value="<[am_price]>" placeholder="0.00" required>
          </div>
        </div>

        <div class="mb-3">
          <label for="image_url" class="form-label">URL Immagine</label>
          <input type="text" class="form-control" id="image_url" name="image_url" value="<[am_image_url]>" placeholder="https://esempio.com/immagine.jpg o percorso relativo">
          <div class="form-text">Inserisci un indirizzo URL assoluto o relativo per l'immagine rappresentativa del servizio extra.</div>
        </div>

        <div class="mb-4">
          <label for="description" class="form-label">Descrizione</label>
          <textarea class="form-control" id="description" name="description" rows="4" placeholder="Fornisci una descrizione dettagliata del servizio extra..."><[am_description]></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><[action_text]></button>
          <a href="amenities.php" class="btn btn-outline-secondary">Annulla</a>
        </div>
      </form>
    </div>
  </section>
</div>
