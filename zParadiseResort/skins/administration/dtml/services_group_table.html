<section class="panel mt-3 mb-4 border border-1 border-secondary-subtle">
  <div class="panel-header">
    <div>
      <h2 class="h5 mb-1 section-title"><i class="bi bi-shield-lock" aria-hidden="true"></i><span>Permessi per <strong><[group_name]></strong></span></h2>
    </div>
    <div class="d-flex flex-wrap gap-2">
      <button type="button" class="btn btn-primary btn-sm" onclick="openAssignModal(<[group_id]>, '<[group_name_js]>')"><i class="bi bi-plus-circle me-1"></i>Aggiungi Permesso</button>
    </div>
  </div>
  <div class="table-responsive">
    <table class="table align-middle mb-0">
      <thead>
        <tr>
          <th scope="col">Nome Permesso (Script)</th>
          <th scope="col">Descrizione</th>
          <th scope="col" class="text-end">Azioni</th>
        </tr>
      </thead>
      <tbody>
        <[foreach]>
        <tr>
          <td><span class="fw-semibold"><[service_name]></span></td>
          <td><[service_description]></td>
          <td class="text-end">
            <button type="button" class="btn btn-sm btn-outline-danger" title="Rimuovi" onclick="openRemoveModal(<[service_group_id]>, <[service_id]>, '<[service_name_js]>', '<[service_group_name_js]>')"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
        <[/foreach]>

        <[ifempty services_list]>
        <tr><td colspan="3" class="text-center py-4 text-muted"> Nessun permesso assegnato a questo gruppo.</td></tr>
        <[/ifempty]>
      </tbody>
    </table>
  </div>
</section>
